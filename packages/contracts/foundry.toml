[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@account-abstraction/=lib/account-abstraction/contracts/"
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
